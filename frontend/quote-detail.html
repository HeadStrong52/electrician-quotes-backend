<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote — Elec Connect</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', sans-serif; }
  [x-cloak] { display: none !important; }
</style>
</head>
<body class="bg-slate-50 min-h-screen" x-data="quotePage()" x-cloak>

<!-- Top Bar -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-20">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <!-- Logo + Back -->
      <a href="/dashboard" class="flex items-center gap-2 text-slate-500 hover:text-orange-500 transition group">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg, #f97316, #ea580c)">
          <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
        </div>
        <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        <span class="text-sm font-medium text-slate-500 group-hover:text-orange-500">Quotes</span>
      </a>
      <span class="text-slate-300">/</span>
      <div class="flex items-center gap-2">
        <span class="font-mono text-sm font-semibold text-orange-500 bg-orange-50 px-2.5 py-1 rounded-lg" x-text="quote?.quote_number || '…'"></span>
        <span :class="statusClass(quote?.status)" class="px-2.5 py-1 rounded-full text-xs font-semibold capitalize" x-text="quote?.status || ''"></span>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-2" x-show="quote">
      <a :href="`/quotes/${quoteId}/pdf?token=${token}`" target="_blank"
        class="flex items-center gap-1.5 px-3.5 py-2 border border-slate-300 text-slate-700 rounded-xl text-sm font-medium hover:bg-slate-50 transition">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        PDF
      </a>
      <!-- Draft: Send button -->
      <button x-show="quote?.status === 'draft'" @click="sendQuote()"
        :disabled="sending || !quote?.line_items?.length"
        class="flex items-center gap-1.5 px-3.5 py-2 bg-orange-500 text-white rounded-xl text-sm font-semibold hover:bg-orange-600 disabled:opacity-50 transition shadow-sm shadow-orange-200">
        <svg x-show="!sending" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        <svg x-show="sending" x-cloak class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        <span x-text="sending ? 'Sending…' : 'Send to Client'"></span>
      </button>
      <!-- Sent: Resend + Revert to Draft -->
      <template x-if="quote?.status === 'sent'">
        <div class="flex items-center gap-2">
          <button @click="revertToDraft()" :disabled="sending"
            class="flex items-center gap-1.5 px-3.5 py-2 border border-slate-300 text-slate-600 rounded-xl text-sm font-medium hover:bg-slate-50 transition">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
            Revert to Draft
          </button>
          <button @click="sendQuote()" :disabled="sending"
            class="flex items-center gap-1.5 px-3.5 py-2 bg-orange-500 text-white rounded-xl text-sm font-semibold hover:bg-orange-600 disabled:opacity-50 transition shadow-sm shadow-orange-200">
            <svg x-show="!sending" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <svg x-show="sending" x-cloak class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
            <span x-text="sending ? 'Sending…' : 'Resend'"></span>
          </button>
        </div>
      </template>
    </div>
  </div>
</header>

<!-- Loading -->
<div x-show="loading" class="flex items-center justify-center py-24">
  <svg class="w-7 h-7 animate-spin text-orange-500" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
  </svg>
</div>

<div x-show="!loading && quote" class="max-w-5xl mx-auto px-6 py-8 space-y-6">

  <!-- Toast -->
  <div x-show="toast" x-cloak
    :class="toastError ? 'bg-red-600' : 'bg-emerald-600'"
    class="fixed top-20 right-6 z-30 text-white text-sm font-medium px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 transition-all">
    <svg x-show="!toastError" class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
    <svg x-show="toastError" x-cloak class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    <span x-text="toast"></span>
  </div>

  <!-- Quote Header Card -->
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
    <div class="px-6 pt-6 pb-5 flex flex-col md:flex-row md:items-start gap-5">
      <div class="flex-1 min-w-0">
        <div class="flex items-start gap-2">
          <h1 class="text-2xl font-bold text-slate-900 leading-tight flex-1" x-text="quote?.title"></h1>
          <button x-show="quote?.status === 'draft'" @click="openEditHeader()"
            class="shrink-0 p-1.5 text-slate-400 hover:text-orange-500 hover:bg-orange-50 rounded-lg transition mt-0.5">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </button>
        </div>
        <div class="flex items-center gap-3 mt-2 flex-wrap">
          <div class="flex items-center gap-1.5 text-slate-500 text-sm">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span x-text="quote?.client_name || '—'"></span>
          </div>
          <div x-show="quote?.site_address" class="flex items-center gap-1.5 text-slate-500 text-sm">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <span x-text="quote?.site_address"></span>
          </div>
          <div class="flex items-center gap-1.5 text-slate-500 text-sm">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <span x-text="quote ? formatDate(quote.created_at) : ''"></span>
          </div>
        </div>
        <div x-show="quote?.notes" class="mt-3 p-3 bg-amber-50 border border-amber-100 rounded-xl text-sm text-amber-800">
          <span x-text="quote?.notes"></span>
        </div>
      </div>
      <!-- Total callout -->
      <div class="shrink-0 text-right bg-slate-50 rounded-xl px-6 py-4 border border-slate-100">
        <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Total (inc. GST)</div>
        <div class="text-3xl font-bold text-slate-900" x-text="quote ? '$' + quote.total.toLocaleString('en-AU', {minimumFractionDigits:2}) : '$0.00'"></div>
        <div class="text-xs text-slate-400 mt-1" x-text="quote ? `Subtotal $${quote.subtotal.toFixed(2)} + GST $${quote.gst.toFixed(2)}` : ''"></div>
      </div>
    </div>
  </div>

  <!-- Line Items Card -->
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <h2 class="font-semibold text-slate-900">Line Items</h2>
      <span class="text-sm text-slate-400" x-text="`${quote?.line_items?.length || 0} items`"></span>
    </div>

    <!-- Empty line items -->
    <div x-show="!quote?.line_items?.length" class="text-center py-10">
      <svg class="w-10 h-10 text-slate-300 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
      </svg>
      <p class="text-slate-500 text-sm" x-show="quote?.status === 'draft'">No items yet — add labour or materials below</p>
      <p class="text-slate-500 text-sm" x-show="quote?.status !== 'draft'">No line items</p>
    </div>

    <!-- Line items table -->
    <div x-show="quote?.line_items?.length">
      <table class="w-full">
        <thead>
          <tr class="text-left border-b border-slate-100">
            <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Description</th>
            <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider hidden md:table-cell">Type</th>
            <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">Qty</th>
            <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">Unit $</th>
            <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">Total</th>
            <th class="px-6 py-3 w-8" x-show="quote?.status === 'draft'"></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50">
          <template x-for="item in quote?.line_items" :key="item.id">
            <tr class="hover:bg-slate-50 transition">
              <td class="px-6 py-3.5">
                <span class="text-sm font-medium text-slate-800" x-text="item.description"></span>
              </td>
              <td class="px-6 py-3.5 hidden md:table-cell">
                <span :class="item.type === 'labour' ? 'bg-blue-100 text-blue-700' : item.type === 'material' ? 'bg-orange-100 text-orange-700' : 'bg-slate-100 text-slate-600'"
                  class="px-2 py-0.5 rounded-full text-xs font-medium capitalize" x-text="item.type"></span>
              </td>
              <td class="px-6 py-3.5 text-right">
                <span class="text-sm text-slate-600" x-text="`${item.quantity} ${item.unit}`"></span>
              </td>
              <td class="px-6 py-3.5 text-right">
                <span class="text-sm text-slate-600" x-text="`$${item.unit_price.toFixed(2)}`"></span>
              </td>
              <td class="px-6 py-3.5 text-right">
                <span class="text-sm font-semibold text-slate-900" x-text="`$${item.total.toFixed(2)}`"></span>
              </td>
              <td class="px-6 py-3.5" x-show="quote?.status === 'draft'">
                <div class="flex items-center gap-1">
                  <button @click="openEditItem(item)" class="p-1 text-slate-300 hover:text-blue-500 hover:bg-orange-50 rounded-lg transition">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                  </button>
                  <button @click="removeItem(item.id)" class="p-1 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                  </button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>

      <!-- Totals -->
      <div class="border-t border-slate-100 px-6 py-4 flex justify-end">
        <div class="space-y-1.5 min-w-48">
          <div class="flex justify-between text-sm text-slate-500">
            <span>Subtotal</span>
            <span x-text="quote ? `$${quote.subtotal.toFixed(2)}` : ''"></span>
          </div>
          <div class="flex justify-between text-sm text-slate-500">
            <span>GST (10%)</span>
            <span x-text="quote ? `$${quote.gst.toFixed(2)}` : ''"></span>
          </div>
          <div class="flex justify-between font-bold text-slate-900 text-base pt-2 border-t border-slate-200">
            <span>Total</span>
            <span x-text="quote ? `$${quote.total.toFixed(2)}` : ''"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Line Item (draft only) -->
  <div x-show="quote?.status === 'draft'" class="bg-white rounded-2xl border border-slate-200 shadow-sm">
    <div class="px-6 py-4 border-b border-slate-100">
      <h2 class="font-semibold text-slate-900">Add Item</h2>
    </div>
    <div class="p-6">
      <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
        <div class="md:col-span-4">
          <label class="block text-xs font-medium text-slate-500 mb-1.5">Description</label>
          <input x-model="newItem.description" placeholder="e.g. Install GPO (double)"
            class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 transition">
        </div>
        <div class="md:col-span-2">
          <label class="block text-xs font-medium text-slate-500 mb-1.5">Type</label>
          <select x-model="newItem.type" class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-orange-500 transition">
            <option value="labour">Labour</option>
            <option value="material">Material</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="md:col-span-2">
          <label class="block text-xs font-medium text-slate-500 mb-1.5">Qty</label>
          <input x-model.number="newItem.quantity" type="number" min="0.01" step="0.01"
            class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 transition">
        </div>
        <div class="md:col-span-2">
          <label class="block text-xs font-medium text-slate-500 mb-1.5">Unit</label>
          <select x-model="newItem.unit" class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-orange-500 transition">
            <option value="ea">ea</option>
            <option value="hrs">hrs</option>
            <option value="m">m</option>
            <option value="lot">lot</option>
          </select>
        </div>
        <div class="md:col-span-2">
          <label class="block text-xs font-medium text-slate-500 mb-1.5">Unit Price</label>
          <div class="relative">
            <span class="absolute left-3 top-2.5 text-slate-400 text-sm">$</span>
            <input x-model.number="newItem.unit_price" type="number" min="0" step="0.01"
              class="w-full pl-6 pr-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 transition">
          </div>
        </div>
      </div>
      <div class="flex items-center justify-between mt-4">
        <div class="text-sm text-slate-500" x-show="newItem.quantity > 0 && newItem.unit_price > 0">
          Total: <strong x-text="`$${(newItem.quantity * newItem.unit_price).toFixed(2)}`"></strong>
        </div>
        <button @click="addItem()" :disabled="!newItem.description || addingItem"
          class="flex items-center gap-2 px-5 py-2.5 bg-orange-500 text-white rounded-xl text-sm font-semibold hover:bg-orange-600 disabled:opacity-50 transition ml-auto">
          <svg x-show="!addingItem" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          <svg x-show="addingItem" x-cloak class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          <span x-text="addingItem ? 'Adding…' : 'Add Item'"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Sent notification -->
  <div x-show="quote?.status === 'sent'" class="bg-orange-50 border border-blue-200 rounded-2xl p-5 flex items-start gap-3">
    <svg class="w-5 h-5 text-orange-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
    </svg>
    <div>
      <p class="font-semibold text-blue-800 text-sm">Quote sent to client</p>
      <p class="text-orange-500 text-sm mt-0.5" x-text="quote?.sent_at ? `Sent ${formatDate(quote.sent_at)}` : ''"></p>
    </div>
  </div>

  <!-- Approved notification -->
  <div x-show="quote?.status === 'approved'" class="bg-emerald-50 border border-emerald-200 rounded-2xl p-5 flex items-start gap-3">
    <svg class="w-5 h-5 text-emerald-600 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <div>
      <p class="font-semibold text-emerald-800 text-sm">Quote approved by client!</p>
      <p class="text-emerald-600 text-sm mt-0.5" x-text="quote?.approved_at ? `Approved ${formatDate(quote.approved_at)}` : ''"></p>
    </div>
  </div>

</div>

<!-- Edit Quote Header Modal -->
<div x-show="showEditHeader" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" @click="showEditHeader = false"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden">
    <div class="flex items-center justify-between px-6 py-5 border-b border-slate-100">
      <h2 class="text-lg font-semibold text-slate-900">Edit Quote Details</h2>
      <button @click="showEditHeader = false" class="text-slate-400 hover:text-slate-700">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Job Title <span class="text-red-500">*</span></label>
        <input x-model="headerForm.title" type="text" placeholder="e.g. Kitchen Renovation — Power & Lighting"
          class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Site Address</label>
        <input x-model="headerForm.site_address" type="text" placeholder="12 Main St, Suburb NSW 2000"
          class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Notes</label>
        <textarea x-model="headerForm.notes" rows="3" placeholder="Special conditions, access instructions…"
          class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 transition resize-none"></textarea>
      </div>
      <div class="flex gap-3 pt-2">
        <button @click="showEditHeader = false" class="flex-1 py-2.5 border border-slate-300 text-slate-700 rounded-xl text-sm font-medium hover:bg-slate-50 transition">Cancel</button>
        <button @click="saveHeader()"
          :disabled="savingHeader || !headerForm.title.trim()"
          class="flex-1 py-2.5 bg-orange-500 text-white rounded-xl text-sm font-semibold hover:bg-orange-600 disabled:opacity-50 transition flex items-center justify-center gap-2">
          <svg x-show="savingHeader" x-cloak class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          <span x-text="savingHeader ? 'Saving…' : 'Save Changes'"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Edit Line Item Modal -->
<div x-show="editItem" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" @click="editItem = null"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
    <div class="flex items-center justify-between px-6 py-5 border-b border-slate-100">
      <h2 class="text-lg font-semibold text-slate-900">Edit Line Item</h2>
      <button @click="editItem = null" class="text-slate-400 hover:text-slate-700">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="p-6 space-y-4" x-show="editItem">
      <div>
        <label class="block text-sm font-medium text-slateate-700 mb-1.5">Description</label>
        <input x-model="editForm.description" type="text"
          class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 transition">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Quantity</label>
          <input x-model="editForm.quantity" type="number" step="0.01" min="0"
            class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Unit Price ($)</label>
          <input x-model="editForm.unit_price" type="number" step="0.01" min="0"
            class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 transition">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Type</label>
        <div class="flex gap-2">
          <template x-for="t in ['labour','material','other']" :key="t">
            <button @click="editForm.type = t"
              :class="editForm.type === t ? 'bg-orange-500 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-300 hover:border-blue-400'"
              class="flex-1 py-2 border rounded-xl text-sm font-medium capitalize transition"
              x-text="t"></button>
          </template>
        </div>
      </div>
      <div class="text-right text-sm text-slate-500 pt-1">
        Total: <span class="font-semibold text-slate-900" x-text="`$${(parseFloat(editForm.quantity||0) * parseFloat(editForm.unit_price||0)).toFixed(2)}`"></span>
      </div>
      <div class="flex gap-3 pt-2">
        <button @click="editItem = null" class="flex-1 py-2.5 border border-slate-300 text-slate-700 rounded-xl text-sm font-medium hover:bg-slate-50 transition">Cancel</button>
        <button @click="saveEditItem()"
          :disabled="savingEdit || !editForm.description.trim()"
          class="flex-1 py-2.5 bg-orange-500 text-white rounded-xl text-sm font-semibold hover:bg-orange-600 disabled:opacity-50 transition flex items-center justify-center gap-2">
          <svg x-show="savingEdit" x-cloak class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          <span x-text="savingEdit ? 'Saving…' : 'Save Changes'"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const API = {
  h: () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('me_token')}` }),
  async req(method, path, body) {
    const opts = { method, headers: this.h() };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(path, opts);
    if (r.status === 401) { localStorage.removeItem('me_token'); window.location.replace('/'); return; }
    if (r.status === 204) return null;
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || r.statusText); }
    return r.json();
  },
  get: (p) => API.req('GET', p),
  post: (p, b) => API.req('POST', p, b),
  patch: (p, b) => API.req('PATCH', p, b)
};

function quotePage() {
  const params = new URLSearchParams(window.location.search);
  const quoteId = parseInt(params.get('id'));

  return {
    quoteId,
    get token() { return localStorage.getItem('me_token'); },
    quote: null,
    loading: true,
    sending: false,
    addingItem: false,
    editItem: null,
    editForm: { description: '', quantity: 1, unit_price: 0, unit: 'ea', type: 'labour' },
    savingEdit: false,
    showEditHeader: false,
    headerForm: { title: '', site_address: '', notes: '' },
    savingHeader: false,
    toast: '',
    toastError: false,
    newItem: { description: '', type: 'labour', quantity: 1, unit: 'ea', unit_price: 0 },

    async init() {
      if (!quoteId) { window.location.href = '/dashboard'; return; }
      if (!localStorage.getItem('me_token')) {
        const r = await fetch('/auth/auto-login', { method: 'POST' });
        if (r.ok) { const { access_token } = await r.json(); localStorage.setItem('me_token', access_token); }
      }
      await this.loadQuote();
    },

    async loadQuote() {
      try {
        this.quote = await API.get(`/quotes/${quoteId}`);
      } catch (e) {
        this.showToast(e.message, true);
      } finally { this.loading = false; }
    },

    async addItem() {
      if (!this.newItem.description.trim()) return;
      this.addingItem = true;
      try {
        const items = (this.quote.line_items || []).map(i => ({
          type: i.type, description: i.description, quantity: i.quantity,
          unit: i.unit, unit_price: i.unit_price, sort_order: i.sort_order
        }));
        items.push({
          type: this.newItem.type,
          description: this.newItem.description.trim(),
          quantity: this.newItem.quantity,
          unit: this.newItem.unit,
          unit_price: this.newItem.unit_price,
          sort_order: items.length
        });
        this.quote = await API.patch(`/quotes/${quoteId}`, { line_items: items });
        this.newItem = { description: '', type: 'labour', quantity: 1, unit: 'ea', unit_price: 0 };
        this.showToast('Item added');
      } catch (e) {
        this.showToast(e.message, true);
      } finally { this.addingItem = false; }
    },

    async removeItem(itemId) {
      try {
        const items = this.quote.line_items
          .filter(i => i.id !== itemId)
          .map(i => ({ type: i.type, description: i.description, quantity: i.quantity, unit: i.unit, unit_price: i.unit_price, sort_order: i.sort_order }));
        this.quote = await API.patch(`/quotes/${quoteId}`, { line_items: items });
        this.showToast('Item removed');
      } catch (e) {
        this.showToast(e.message, true);
      }
    },

    async sendQuote() {
      this.sending = true;
      try {
        this.quote = await API.post(`/quotes/${quoteId}/send`);
        this.showToast(`Quote sent to ${this.quote.client_name}`);
      } catch (e) {
        this.showToast(e.message, true);
      } finally { this.sending = false; }
    },

    async revertToDraft() {
      this.sending = true;
      try {
        this.quote = await API.post(`/quotes/${quoteId}/revert`);
        this.showToast('Reverted to draft');
      } catch (e) {
        this.showToast(e.message, true);
      } finally { this.sending = false; }
    },

    openEditHeader() {
      this.headerForm = {
        title: this.quote.title || '',
        site_address: this.quote.site_address || '',
        notes: this.quote.notes || ''
      };
      this.showEditHeader = true;
    },

    async saveHeader() {
      if (!this.headerForm.title.trim()) return;
      this.savingHeader = true;
      try {
        this.quote = await API.patch(`/quotes/${quoteId}`, {
          title: this.headerForm.title.trim(),
          site_address: this.headerForm.site_address.trim() || null,
          notes: this.headerForm.notes.trim() || null,
        });
        this.showEditHeader = false;
        this.showToast('Quote updated');
      } catch (e) {
        this.showToast(e.message, true);
      } finally { this.savingHeader = false; }
    },

    openEditItem(item) {
      this.editItem = item;
      this.editForm = {
        description: item.description,
        quantity: item.quantity,
        unit_price: item.unit_price,
        unit: item.unit,
        type: item.type
      };
    },

    async saveEditItem() {
      if (!this.editItem) return;
      this.savingEdit = true;
      try {
        const updated = await API.patch(`/quotes/${quoteId}/items/${this.editItem.id}`, {
          description: this.editForm.description,
          quantity: parseFloat(this.editForm.quantity),
          unit_price: parseFloat(this.editForm.unit_price),
          unit: this.editForm.unit,
          type: this.editForm.type
        });
        // Update item in place and recalculate totals
        const idx = this.quote.line_items.findIndex(i => i.id === this.editItem.id);
        if (idx !== -1) this.quote.line_items[idx] = updated;
        await this.loadQuote(); // reload to get updated totals
        this.editItem = null;
        this.showToast('Item updated');
      } catch (e) {
        this.showToast(e.message, true);
      } finally { this.savingEdit = false; }
    },

    showToast(msg, isError = false) {
      this.toast = msg; this.toastError = isError;
      setTimeout(() => this.toast = '', 3500);
    },

    statusClass(status) {
      const m = { draft: 'bg-slate-100 text-slate-600', sent: 'bg-blue-100 text-blue-700', approved: 'bg-emerald-100 text-emerald-700', declined: 'bg-red-100 text-red-700', invoiced: 'bg-purple-100 text-purple-700', paid: 'bg-emerald-100 text-emerald-800' };
      return m[status] || 'bg-slate-100 text-slate-600';
    },

    formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
    }
  }
}
</script>
</body>
</html>
