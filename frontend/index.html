<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum Electrical</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #1e3a5f 100%)">

<div class="text-center">
  <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-6 shadow-xl" style="background: linear-gradient(135deg, #2563eb, #1d4ed8)">
    <svg class="w-9 h-9 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
    </svg>
  </div>
  <h1 class="text-2xl font-bold text-white tracking-tight mb-2">Momentum Electrical</h1>
  <p class="text-slate-400 text-sm" id="msg">Loading…</p>
</div>

<script>
(async () => {
  const msg = document.getElementById('msg');

  // Already have a valid token — go straight in
  if (localStorage.getItem('me_token')) {
    window.location.replace('/dashboard');
    return;
  }

  // Obtain a token automatically (no credentials required)
  try {
    msg.textContent = 'Signing in…';
    const res = await fetch('/auth/auto-login', { method: 'POST' });
    if (!res.ok) throw new Error('Auto-login failed');
    const { access_token } = await res.json();
    localStorage.setItem('me_token', access_token);
    window.location.replace('/dashboard');
  } catch (e) {
    msg.textContent = 'Could not connect to the server. Please refresh the page.';
    msg.classList.add('text-red-400');
  }
})();
</script>
</body>
</html>
