<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum Electrical — Sign In</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', sans-serif; }
  [x-cloak] { display: none !important; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #1e3a5f 100%)">

<div x-data="authPage()" x-cloak class="w-full max-w-md">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4 shadow-xl" style="background: linear-gradient(135deg, #2563eb, #1d4ed8)">
      <svg class="w-9 h-9 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-white tracking-tight">Momentum Electrical</h1>
    <p class="text-slate-400 text-sm mt-1">Quoting &amp; Job Management</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">

    <!-- Tabs -->
    <div class="flex border-b border-slate-100">
      <button @click="tab='login'"
        :class="tab==='login' ? 'border-b-2 border-blue-600 text-blue-600 font-semibold' : 'text-slate-500 hover:text-slate-700'"
        class="flex-1 py-4 text-sm transition-all">Sign In</button>
      <button @click="tab='register'"
        :class="tab==='register' ? 'border-b-2 border-blue-600 text-blue-600 font-semibold' : 'text-slate-500 hover:text-slate-700'"
        class="flex-1 py-4 text-sm transition-all">Create Account</button>
    </div>

    <div class="p-8">

      <!-- Error banner -->
      <div x-show="error" x-cloak class="mb-5 p-3.5 bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl flex items-start gap-2">
        <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <span x-text="error"></span>
      </div>

      <!-- ── SIGN IN ── -->
      <form x-show="tab==='login'" @submit.prevent="login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
          <input x-model="loginForm.email" type="email" required autocomplete="email"
            class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            placeholder="you@example.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input x-model="loginForm.password" type="password" required autocomplete="current-password"
            class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            placeholder="••••••••">
        </div>
        <button type="submit" :disabled="loading"
          class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold rounded-xl text-sm transition-colors flex items-center justify-center gap-2 mt-2">
          <svg x-show="loading" x-cloak class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          <span x-text="loading ? 'Signing in…' : 'Sign In'"></span>
        </button>
        <p class="text-xs text-center text-slate-400 pt-1">Don't have an account?
          <button type="button" @click="tab='register'; error=''" class="text-blue-600 hover:underline font-medium">Create one</button>
        </p>
      </form>

      <!-- ── CREATE ACCOUNT ── -->
      <form x-show="tab==='register'" @submit.prevent="register" class="space-y-4">

        <!-- Name + Business Name side by side -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Your Name <span class="text-red-500">*</span></label>
            <input x-model="reg.name" type="text" required
              class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="Steve">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Business Name <span class="text-red-500">*</span></label>
            <input x-model="reg.business_name" type="text" required
              class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="Momentum Electrical">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Email address <span class="text-red-500">*</span></label>
          <input x-model="reg.email" type="email" required autocomplete="email"
            class="w-full px-3.5 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            placeholder="steve@momentumelectrical.com.au">
        </div>

        <!-- Password with strength indicator -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Password <span class="text-red-500">*</span></label>
          <div class="relative">
            <input x-model="reg.password"
              :type="showPassword ? 'text' : 'password'"
              required autocomplete="new-password"
              class="w-full px-3.5 py-2.5 pr-10 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="Create a strong password"
              @input="checkPassword">
            <button type="button" @click="showPassword = !showPassword"
              class="absolute right-3 top-2.5 text-slate-400 hover:text-slate-600">
              <svg x-show="!showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg x-show="showPassword" x-cloak class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>

          <!-- Password strength requirements -->
          <div x-show="reg.password.length > 0" x-cloak class="mt-3 p-3 bg-slate-50 rounded-xl space-y-1.5">
            <p class="text-xs font-medium text-slate-500 mb-2">Password must include:</p>
            <template x-for="check in pwChecks" :key="check.label">
              <div class="flex items-center gap-2">
                <div :class="check.pass ? 'bg-emerald-500' : 'bg-slate-300'" class="w-4 h-4 rounded-full flex items-center justify-center shrink-0 transition-colors">
                  <svg x-show="check.pass" class="w-2.5 h-2.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                  <svg x-show="!check.pass" class="w-2 h-2 text-white" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/></svg>
                </div>
                <span :class="check.pass ? 'text-emerald-700' : 'text-slate-500'" class="text-xs transition-colors" x-text="check.label"></span>
              </div>
            </template>
          </div>
        </div>

        <button type="submit" :disabled="loading || !allChecksPass"
          class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold rounded-xl text-sm transition-colors flex items-center justify-center gap-2 mt-2">
          <svg x-show="loading" x-cloak class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
          </svg>
          <span x-text="loading ? 'Creating account…' : 'Create Account & Continue'"></span>
        </button>

        <p class="text-xs text-center text-slate-400 pt-1">Already have an account?
          <button type="button" @click="tab='login'; error=''" class="text-blue-600 hover:underline font-medium">Sign in</button>
        </p>
      </form>

    </div>
  </div>

  <p class="text-center text-slate-600 text-xs mt-6">© <span x-text="new Date().getFullYear()"></span> Momentum Electrical. All rights reserved.</p>
</div>

<script>
if (localStorage.getItem('me_token')) window.location.href = '/dashboard';

function authPage() {
  return {
    tab: 'login',
    loading: false,
    error: '',
    showPassword: false,
    loginForm: { email: '', password: '' },
    reg: { name: '', business_name: '', email: '', password: '' },
    pwChecks: [
      { label: 'At least 8 characters', pass: false, test: (p) => p.length >= 8 },
      { label: 'One uppercase letter (A–Z)', pass: false, test: (p) => /[A-Z]/.test(p) },
      { label: 'One lowercase letter (a–z)', pass: false, test: (p) => /[a-z]/.test(p) },
      { label: 'One number (0–9)', pass: false, test: (p) => /\d/.test(p) },
    ],

    get allChecksPass() {
      return this.pwChecks.every(c => c.pass) && this.reg.name.trim() && this.reg.business_name.trim() && this.reg.email;
    },

    checkPassword() {
      this.pwChecks.forEach(c => c.pass = c.test(this.reg.password));
    },

    async login() {
      this.loading = true; this.error = '';
      try {
        const res = await fetch('/auth/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ username: this.loginForm.email, password: this.loginForm.password })
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || 'Invalid credentials'); }
        const { access_token } = await res.json();
        localStorage.setItem('me_token', access_token);
        window.location.href = '/dashboard';
      } catch (e) { this.error = e.message; }
      finally { this.loading = false; }
    },

    async register() {
      if (!this.allChecksPass) return;
      this.loading = true; this.error = '';
      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.reg)
        });
        if (!res.ok) {
          const e = await res.json();
          const detail = e.detail;
          throw new Error(Array.isArray(detail) ? detail.map(d => d.msg).join('. ') : detail || 'Registration failed');
        }
        // Auto-login
        const lr = await fetch('/auth/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ username: this.reg.email, password: this.reg.password })
        });
        if (!lr.ok) throw new Error('Account created! Please sign in.');
        const { access_token } = await lr.json();
        localStorage.setItem('me_token', access_token);
        // Signal that this is a fresh account so dashboard shows setup prompt
        localStorage.setItem('me_setup_pending', '1');
        window.location.href = '/dashboard';
      } catch (e) { this.error = e.message; }
      finally { this.loading = false; }
    }
  }
}
</script>
</body>
</html>
